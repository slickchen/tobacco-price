{name:"云烟(细支大重九)",category:"云烟",price:680,profit:-30,tar:6,retail:800},
{name:"云烟(大重九)",category:"云烟",price:680,profit:-30,tar:8,retail:800}
];

// State
let activeCategory = '全部';
let activeSort = 'default';
let searchTerm = '';

// Generate categories dynamically
const categories = ['全部', ...[...new Set(DATA.map(d => d.category))]];

// Sort options
const sortOptions = [
  {key:'default',label:'默认'},
  {key:'price_asc',label:'价格 ↑'},
  {key:'price_desc',label:'价格 ↓'},
  {key:'tar_asc',label:'焦油 ↑'},
  {key:'tar_desc',label:'焦油 ↓'},
  {key:'profit_asc',label:'利润 ↑'},
  {key:'profit_desc',label:'利润 ↓'}
];

function renderStats() {
  const up = DATA.filter(d => d.profit > 0).length;
  const down = DATA.filter(d => d.profit < 0).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat stat-total"><div class="num">${DATA.length}</div><div class="label">总品种</div></div>
    <div class="stat stat-up"><div class="num">${up}</div><div class="label">上涨</div></div>
    <div class="stat stat-down"><div class="num">${down}</div><div class="label">下跌</div></div>
  `;
}

function renderFilters() {
  document.getElementById('filterTags').innerHTML = categories.map(c =>
    `<div class="tag${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</div>`
  ).join('');
}

function renderSortButtons() {
  document.getElementById('sortWrap').innerHTML = sortOptions.map(s =>
    `<div class="sort-btn${s.key===activeSort?' active':''}" onclick="setSort('${s.key}')">${s.label}</div>`
  ).join('');
}

function getFiltered() {
  let list = [...DATA];
  if (activeCategory !== '全部') list = list.filter(d => d.category === activeCategory);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(d => d.name.toLowerCase().includes(q) || d.category.toLowerCase().includes(q));
  }
  switch(activeSort) {
    case 'price_asc': list.sort((a,b)=>a.price-b.price); break;
    case 'price_desc': list.sort((a,b)=>b.price-a.price); break;
    case 'tar_asc': list.sort((a,b)=>a.tar-b.tar); break;
    case 'tar_desc': list.sort((a,b)=>b.tar-a.tar); break;
    case 'profit_asc': list.sort((a,b)=>a.profit-b.profit); break;
    case 'profit_desc': list.sort((a,b)=>b.profit-a.profit); break;
  }
  return list;
}

function renderCards() {
  const list = getFiltered();
  document.getElementById('resultCount').textContent = `共 ${list.length} 条结果`;
  if (!list.length) {
    document.getElementById('cardList').innerHTML = '<div class="empty">😢 没有找到匹配的产品</div>';
    return;
  }
  document.getElementById('cardList').innerHTML = list.map(d => {
    const pClass = d.profit > 0 ? 'up' : (d.profit < 0 ? 'down' : '');
    const pText = d.profit > 0 ? `+${d.profit}` : `${d.profit}`;
    return `<div class="card">
      <div class="card-top">
        <div class="card-name">${d.name}</div>
        <div class="card-category">${d.category}</div>
      </div>
      <div class="card-mid">
        <div class="card-price">¥${d.price}<span>/条</span></div>
        <div class="card-profit ${pClass}">${pText}</div>
      </div>
      <div class="card-bot">
        <div class="card-tar">🫧 焦油 ${d.tar}mg</div>
        <div class="card-retail">💰 零售 ¥${d.retail}/条</div>
      </div>
    </div>`;
  }).join('');
}

function setCategory(c) {
  activeCategory = c;
  renderFilters();
  renderCards();
}

function setSort(s) {
  activeSort = s;
  renderSortButtons();
  renderCards();
}

document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.trim();
  renderCards();
});

// Init
renderStats();
renderFilters();
renderSortButtons();
renderCards();
</script>
</body>
</html>
