<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚬 烟草价格查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--card-border:#2a2a2a;--gold:#ffc107;--green:#00cc66;--purple:#ab47bc;--blue:#42a5f5;--red:#ef5350;--text:#e0e0e0;--dim:#666;--tag-bg:#252525;--tag-active:#3a3a3a;--tag-border:#444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:60px;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{padding:16px;text-align:center;border-bottom:1px solid var(--card-border)}
.header h1{font-size:20px;margin-bottom:4px}
.header .date{font-size:12px;color:var(--dim)}
.stats{display:flex;justify-content:center;gap:24px;padding:12px 16px;border-bottom:1px solid var(--card-border)}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:700}
.stat .label{font-size:11px;color:var(--dim);margin-top:2px}
.stat.up .num{color:var(--red)}
.stat.down .num{color:var(--green)}
.stat.total .num{color:var(--gold)}
.search-wrap{padding:12px 16px;position:relative}
.search-wrap input{width:100%;padding:10px 40px 10px 14px;border-radius:8px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-size:15px;outline:none}
.search-wrap input::placeholder{color:var(--dim)}
.search-wrap input:focus{border-color:var(--gold)}
.search-clear{position:absolute;right:28px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 8px;display:none;line-height:1}
.search-clear.show{display:block}
.filters{padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px}
.filter-tag{padding:5px 12px;border-radius:16px;font-size:12px;background:var(--tag-bg);border:1px solid var(--tag-border);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-tag.active{background:var(--tag-active);color:var(--gold);border-color:var(--gold)}
.sort-bar{padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sort-bar span{font-size:12px;color:var(--dim);margin-right:4px}
.sort-btn{padding:4px 10px;border-radius:6px;font-size:11px;background:var(--tag-bg);border:1px solid var(--tag-border);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.sort-btn.active{background:var(--tag-active);color:var(--gold);border-color:var(--gold)}
.card-list{padding:8px 12px}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-name{font-size:15px;font-weight:600;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-cat{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--tag-bg);color:var(--dim);margin-left:8px;white-space:nowrap;border:1px solid var(--tag-border)}
.price-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px}
.price-item{display:flex;flex-direction:column}
.price-label{font-size:10px;color:var(--dim);margin-bottom:2px}
.price-val{font-size:14px;font-weight:600}
.price-val.gold{color:var(--gold)}
.price-val.green{color:var(--green)}
.price-val.purple{color:var(--purple)}
.price-val.dim{color:var(--dim)}
.custom-input{background:transparent;border:1px dashed var(--green);border-radius:4px;color:var(--green);font-size:14px;font-weight:600;width:100%;max-width:90px;padding:2px 4px;outline:none;font-family:inherit;min-height:28px;-moz-appearance:textfield}
.custom-input::-webkit-outer-spin-button,.custom-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.custom-input:focus{border-style:solid;background:rgba(0,204,102,.08)}
.detail-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.detail-item{display:flex;flex-direction:column}
.detail-label{font-size:10px;color:var(--dim);margin-bottom:2px}
.detail-val{font-size:13px;font-weight:500}
.detail-val.blue{color:var(--blue)}
.detail-val.dim{color:var(--dim)}
.detail-val.profit-up{color:var(--red)}
.detail-val.profit-down{color:var(--green)}
.detail-val.profit-zero{color:var(--dim)}
.empty{text-align:center;padding:40px;color:var(--dim);font-size:14px}
</style>
</head>

if(n.includes("利群"))return"利群";if(n.includes("黄山"))return"黄山";if(n.includes("七匹狼"))return"七匹狼";
if(n.includes("泰山"))return"泰山";if(n.includes("黄金叶"))return"黄金叶";
if(n.includes("黄鹤楼")||n.includes("天下名楼")||n.includes("天下胜景"))return"黄鹤楼";if(n.includes("1916")&&i>=146&&i<=150)return"黄鹤楼";
if(n.includes("白沙")||n.includes("和天下"))return"白沙";if(n.includes("椰树"))return"椰树";
if(n.includes("双喜")||n.includes("莲香"))return"双喜";if(n.includes("五叶神"))return"五叶神";
if(i>=191&&i<=194)return"红玫王";if(n.includes("好日子"))return"好日子";if(n.includes("真龙"))return"真龙";
if(n.includes("娇子")||n.includes("格调"))return"娇子";if(n.includes("宽窄"))return"宽窄";
if(n.includes("金圣"))return"金圣";if(n.includes("贵烟"))return"贵烟";if(n.includes("云烟"))return"云烟";
if(n.includes("玉溪"))return"玉溪";if(n.includes("红梅"))return"红梅";
if(n.includes("红塔山")||n.includes("百塔山"))return"红塔山";if(n.includes("好猫"))return"好猫";
if(n.includes("长城"))return"长城";if(n.includes("天子")||n.includes("金天子"))return"天子";
if(n.includes("万宝路"))return"万宝路";if(n.includes("555"))return"555";if(n.includes("建牌"))return"建牌";

if(n.includes("兰州"))return"兰州";if(n.includes("雪之韵"))return"雪之韵";
if(n.includes("熊猫")||n.includes("大熊猫"))return"熊猫";if(n.includes("春天"))return"春天";
if(n.includes("国之宝"))return"国之宝";if(n==="红色132")return"雪茄";return"其他"}

const LS="tobacco_custom_prices";
function lc(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function sc(o){localStorage.setItem(LS,JSON.stringify(o))}

let cp=lc();
const DATA=R.map(([name,price,profit],i)=>({name,category:gc(name,i),price,profit,tar:0,retail:0,customPrice:cp[name]!==undefined?cp[name]:price,_i:i}));

let curFilter="全部",curSort="default",sq="";

const cats=["全部",...[...new Set(DATA.map(d=>d.category))].sort()];

function profitCls(v){return v>0?"profit-up":v<0?"profit-down":"profit-zero"}
function profitPre(v){return v>0?"+":""}
function fmtP(v){return v===0?"--":"¥"+v}
function fmtD(v){return v===0?"--":""+v}

function renderCards(items){
  const el=document.getElementById("cardList");
  if(!items.length){el.innerHTML='<div class="empty">没有匹配的结果</div>';return}
  let h='';
  for(const d of items){
    const cprofit=d.customPrice-d.price;
    h+=`<div class="card" data-idx="${d._i}">
<div class="card-top"><span class="card-name">${d.name}</span><span class="card-cat">${d.category}</span></div>
<div class="price-row">
<div class="price-item"><span class="price-label">批发</span><span class="price-val gold">${fmtP(d.price)}</span></div>
<div class="price-item"><span class="price-label">几何</span><input class="custom-input" type="number" step="0.1" value="${d.customPrice}" data-name="${d.name}"></div>
<div class="price-item"><span class="price-label">零售</span><span class="price-val ${d.retail?'purple':'dim'}">${fmtP(d.retail)}</span></div>
</div>
<div class="detail-row">
<div class="detail-item"><span class="detail-label">🫧焦油</span><span class="detail-val ${d.tar?'blue':'dim'}">${fmtD(d.tar)}${d.tar?'mg':''}</span></div>
<div class="detail-item"><span class="detail-label">💰利润</span><span class="detail-val ${profitCls(d.profit)}">${profitPre(d.profit)}${d.profit}</span></div>
<div class="detail-item"><span class="detail-label">📐几何利润</span><span class="detail-val ${profitCls(cprofit)}">${profitPre(cprofit)}${cprofit.toFixed(1)}</span></div>
</div></div>`}
  el.innerHTML=h;

  el.querySelectorAll('.custom-input').forEach(inp=>{
    inp.addEventListener('change',function(){
      const name=this.dataset.name;
      const val=parseFloat(this.value);
      if(!isNaN(val)){
        const item=DATA.find(d=>d.name===name);
        if(item){item.customPrice=val;cp[name]=val;sc(cp)}
        renderCards(getFiltered());
      }
    });
    inp.addEventListener('focus',function(){this.select()});
  });
}

function getFiltered(){
  let items=[...DATA];
  if(curFilter!=="全部")items=items.filter(d=>d.category===curFilter);
  if(sq){
    const q=sq.toLowerCase();
    items=items.filter(d=>d.name.toLowerCase().includes(q)||d.category.toLowerCase().includes(q));
  }
  switch(curSort){
    case"price-asc":items.sort((a,b)=>a.price-b.price);break;
    case"price-desc":items.sort((a,b)=>b.price-a.price);break;
    case"tar-asc":items.sort((a,b)=>a.tar-b.tar);break;
    case"tar-desc":items.sort((a,b)=>b.tar-a.tar);break;
    case"profit-asc":items.sort((a,b)=>a.profit-b.profit);break;
    case"profit-desc":items.sort((a,b)=>b.profit-a.profit);break;
    case"cprofit-asc":items.sort((a,b)=>(a.customPrice-a.price)-(b.customPrice-b.price));break;
    case"cprofit-desc":items.sort((a,b)=>(b.customPrice-b.price)-(a.customPrice-a.price));break;
  }
  return items;
}

function update(){
  const items=getFiltered();
  document.getElementById("totalCount").textContent=items.length;
  document.getElementById("upCount").textContent=items.filter(d=>d.profit>0).length;
  document.getElementById("downCount").textContent=items.filter(d=>d.profit<0).length;
  renderCards(items);
}

// Init filters
const fEl=document.getElementById("filters");
fEl.innerHTML=cats.map(c=>`<span class="filter-tag${c==="全部"?" active":""}" data-cat="${c}">${c}</span>`).join('');
fEl.addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-tag'))return;
  fEl.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  curFilter=e.target.dataset.cat;
  update();
});

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    curSort=this.dataset.sort;
    update();
  });
});

// Search
const sInput=document.getElementById("searchInput");
const sClear=document.getElementById("searchClear");
sInput.addEventListener('input',function(){
  sq=this.value.trim();
  sClear.classList.toggle('show',sq.length>0);
  update();
});
sClear.addEventListener('click',function(){
  sInput.value="";sq="";sClear.classList.remove('show');update();
});

update();
</script>
